<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect 4 Elite - Play against Advanced AI</title>
  <meta name="description" content="Play Connect 4 against a highly competitive, elite AI featuring minimax search with alpha-beta pruning. Sleek glassmorphism design with fluid animations and responsive gameplay.">
  <link rel="stylesheet" href="style.css">
  <!-- Import Orbitron and Inter Google Fonts for futuristic, readable typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="logo">CONNECT <span class="accent-text">4</span> <span class="sub-logo">ELITE</span></h1>
      <p class="tagline">An Advanced Minimax AI Opponent</p>
    </header>

    <main class="game-layout">
      <!-- Left sidebar: Game settings & Controls -->
      <section class="controls-panel card">
        <h2>CONFIGURATION</h2>
        
        <div class="control-group">
          <label for="difficulty-select">AI DIFFICULTY</label>
          <select id="difficulty-select">
            <option value="easy">Easy (2 plies)</option>
            <option value="medium">Medium (4 plies)</option>
            <option value="elite" selected>Elite AI (8 plies)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="starter-select">FIRST PLAYER</label>
          <select id="starter-select">
            <option value="player">You (Red)</option>
            <option value="ai">Elite AI (Cyan)</option>
          </select>
        </div>

        <div class="score-board">
          <div class="score-box player-score">
            <span class="label">PLAYER</span>
            <span id="player-wins" class="score-val">0</span>
          </div>
          <div class="score-box draw-score">
            <span class="label">DRAWS</span>
            <span id="draw-count" class="score-val">0</span>
          </div>
          <div class="score-box ai-score">
            <span class="label">ELITE AI</span>
            <span id="ai-wins" class="score-val">0</span>
          </div>
        </div>

        <div class="action-buttons">
          <button id="undo-btn" class="btn btn-secondary" title="Undo your last move">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
            UNDO MOVE
          </button>
          <button id="reset-btn" class="btn btn-primary" title="Restart the game">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 11-.57-8.38l5.67-5.67"/></svg>
            RESET GAME
          </button>
        </div>
      </section>

      <!-- Center: Play Area -->
      <section class="play-panel">
        <div class="status-bar card">
          <div class="turn-indicator">
            <div id="turn-dot" class="dot red-turn"></div>
            <span id="turn-text">YOUR TURN</span>
          </div>
          <div id="ai-thinking" class="thinking-indicator hidden">
            <span class="pulse-dot"></span>
            <span class="pulse-dot"></span>
            <span class="pulse-dot"></span>
            <span>AI THINKING...</span>
          </div>
        </div>

        <div class="board-outer-container">
          <!-- Interactive Column Indicators above the board -->
          <div id="interactive-headers" class="board-headers">
            <div class="header-col" data-col="0"></div>
            <div class="header-col" data-col="1"></div>
            <div class="header-col" data-col="2"></div>
            <div class="header-col" data-col="3"></div>
            <div class="header-col" data-col="4"></div>
            <div class="header-col" data-col="5"></div>
            <div class="header-col" data-col="6"></div>
          </div>

          <!-- Main Game Board Container -->
          <div id="game-board" class="board-container">
            <!-- Game pieces will drop behind the front board cover -->
            <div id="pieces-layer" class="pieces-layer"></div>
            
            <!-- SVG Overlay Mask to cut out circles -->
            <svg id="board-mask-svg" viewBox="0 0 700 600" preserveAspectRatio="none" class="board-mask-svg">
              <defs>
                <mask id="grid-mask">
                  <!-- White background keeps the area solid -->
                  <rect width="700" height="600" fill="white" />
                  <!-- 7 columns (cx) by 6 rows (cy) of circular holes (fill black) -->
                  <!-- Row 0 -->
                  <circle cx="50" cy="50" r="38" fill="black" />
                  <circle cx="150" cy="50" r="38" fill="black" />
                  <circle cx="250" cy="50" r="38" fill="black" />
                  <circle cx="350" cy="50" r="38" fill="black" />
                  <circle cx="450" cy="50" r="38" fill="black" />
                  <circle cx="550" cy="50" r="38" fill="black" />
                  <circle cx="650" cy="50" r="38" fill="black" />
                  <!-- Row 1 -->
                  <circle cx="50" cy="150" r="38" fill="black" />
                  <circle cx="150" cy="150" r="38" fill="black" />
                  <circle cx="250" cy="150" r="38" fill="black" />
                  <circle cx="350" cy="150" r="38" fill="black" />
                  <circle cx="450" cy="150" r="38" fill="black" />
                  <circle cx="550" cy="150" r="38" fill="black" />
                  <circle cx="650" cy="150" r="38" fill="black" />
                  <!-- Row 2 -->
                  <circle cx="50" cy="250" r="38" fill="black" />
                  <circle cx="150" cy="250" r="38" fill="black" />
                  <circle cx="250" cy="250" r="38" fill="black" />
                  <circle cx="350" cy="250" r="38" fill="black" />
                  <circle cx="450" cy="250" r="38" fill="black" />
                  <circle cx="550" cy="250" r="38" fill="black" />
                  <circle cx="650" cy="250" r="38" fill="black" />
                  <!-- Row 3 -->
                  <circle cx="50" cy="350" r="38" fill="black" />
                  <circle cx="150" cy="350" r="38" fill="black" />
                  <circle cx="250" cy="350" r="38" fill="black" />
                  <circle cx="350" cy="350" r="38" fill="black" />
                  <circle cx="450" cy="350" r="38" fill="black" />
                  <circle cx="550" cy="350" r="38" fill="black" />
                  <circle cx="650" cy="350" r="38" fill="black" />
                  <!-- Row 4 -->
                  <circle cx="50" cy="450" r="38" fill="black" />
                  <circle cx="150" cy="450" r="38" fill="black" />
                  <circle cx="250" cy="450" r="38" fill="black" />
                  <circle cx="350" cy="450" r="38" fill="black" />
                  <circle cx="450" cy="450" r="38" fill="black" />
                  <circle cx="550" cy="450" r="38" fill="black" />
                  <circle cx="650" cy="450" r="38" fill="black" />
                  <!-- Row 5 -->
                  <circle cx="50" cy="550" r="38" fill="black" />
                  <circle cx="150" cy="550" r="38" fill="black" />
                  <circle cx="250" cy="550" r="38" fill="black" />
                  <circle cx="350" cy="550" r="38" fill="black" />
                  <circle cx="450" cy="550" r="38" fill="black" />
                  <circle cx="550" cy="550" r="38" fill="black" />
                  <circle cx="650" cy="550" r="38" fill="black" />
                </mask>
              </defs>
              <!-- Drawn board covering the pieces behind it, masked by circles -->
              <rect width="700" height="600" fill="url(#board-glow-grad)" mask="url(#grid-mask)" class="board-plate" />
              
              <!-- Gradient fill for the board plate -->
              <linearGradient id="board-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1b193a" />
                <stop offset="100%" stop-color="#0f0e22" />
              </linearGradient>
            </svg>
            
            <!-- Glow grid effect layer to sit above the mask (drawn using grid columns) -->
            <div class="grid-glow-columns">
              <div class="glow-col" data-col="0"></div>
              <div class="glow-col" data-col="1"></div>
              <div class="glow-col" data-col="2"></div>
              <div class="glow-col" data-col="3"></div>
              <div class="glow-col" data-col="4"></div>
              <div class="glow-col" data-col="5"></div>
              <div class="glow-col" data-col="6"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Game Over Overlay Screen -->
    <div id="game-over-screen" class="overlay hidden">
      <div class="overlay-content card">
        <h2 id="winner-title">VICTORY!</h2>
        <p id="winner-subtitle">You beat the elite AI opponent.</p>
        <button id="play-again-btn" class="btn btn-primary btn-large">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 11-.57-8.38l5.67-5.67"/></svg>
          PLAY AGAIN
        </button>
        <button id="watch-replay-btn" class="btn btn-secondary btn-large">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          WATCH REPLAY
        </button>
      </div>
    </div>
  </div>

  <!-- Entry Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
